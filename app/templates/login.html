{% extends "base.html" %}

{% block title %}{{ t.login_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white fw-semibold">{{ t.login_title }}</div>
      <div class="card-body">
        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">{{ t.login_username }}</label>
            <input type="text" name="username" class="form-control" autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ t.login_password }}</label>
            <input type="password" name="password" class="form-control" autocomplete="current-password" required>
          </div>
          <button class="btn btn-primary w-100">{{ t.login_submit }}</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
