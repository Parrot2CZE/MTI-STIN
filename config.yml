# Konfigurace měnové aplikace
# --------------------------------------------------
# API klíče: pokud jsou vyplněny zde, mají přednost před env proměnnými.
# Pro produkci doporučujeme nechat prázdné a použít env / GitHub Secrets.

api_keys:
  exchangerate: ""          # pokud prázdné, použije se EXCHANGERATE_API_KEY z env

# Uživatelé pro Basic Auth
# Hesla jsou hashovaná bcryptem — pro vygenerování hashe spusť:
#   python -c "import bcrypt; print(bcrypt.hashpw(b'heslo', bcrypt.gensalt()).decode())"
users:
  - username: admin
    # výchozí heslo: admin123
    password_hash: "$2b$12$AToDNTBMeFOe.9yrRfbAyunxh7Shta0BP9djVEJmnLdDi789Qu3G."

currencies:
  base:
    - USD
    - EUR
    - GBP
    - CZK
    - CHF
    - JPY
    - PLN
    - HUF
    - CAD
    - AUD
    - SEK
    - NOK
    - DKK
    - CNY
    - INR
  compare:
    - USD
    - EUR
    - GBP
    - JPY
    - CHF
    - CZK
    - PLN
    - HUF
    - CAD
    - AUD
    - SEK
    - NOK
    - DKK
    - CNY
    - INR

cache:
  timeout_seconds: 1200
  timeout_seconds_dev: 300

rate_limit:
  default: "60 per minute"
  # Cooldown tlačítka "Zobrazit kurzy" v sekundách
  button_cooldown_seconds: 60

api:
  base_url: "https://api.exchangerate.host"

