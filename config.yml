# Konfigurace měnové aplikace
# Tajné hodnoty (SECRET_KEY, EXCHANGERATE_API_KEY) patří do .env, ne sem.

currencies:
  # Měny dostupné jako Základní měna
  base:
    - USD
    - EUR
    - GBP
    - CZK
    - CHF
    - JPY
    - PLN
    - HUF
    - CAD
    - AUD
    - SEK
    - NOK
    - DKK
    - CNY
    - INR

  # Měny dostupné v seznamu Porovnávané měny
  compare:
    - USD
    - EUR
    - GBP
    - JPY
    - CHF
    - CZK
    - PLN
    - HUF
    - CAD
    - AUD
    - SEK
    - NOK
    - DKK
    - CNY
    - INR

cache:
  timeout_seconds: 1200       # aktuální kurzy — 20 minut
  timeout_seconds_dev: 300    # při vývoji — 5 minut

rate_limit:
  default: "60 per minute"

api:
  base_url: "https://api.exchangerate.host"
