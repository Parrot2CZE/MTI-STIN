name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Testy + coverage report
  # ──────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení Pythonu 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalace závislostí
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Spuštění testů a generování coverage reportu
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret
          EXCHANGERATE_API_KEY: test-key
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage na Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true

      - name: Upload coverage reportu jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────
  # JOB 2: Deploy na Azure (pouze push na main)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy na Azure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení Pythonu 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalace závislostí
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Přihlášení do Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0368C3E91EE14B42966715AE98B7B04D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1FF21008CA9E4EF5BAA243B3F6F8417B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6E442F70FC17491BA11B210ED78FA17E }}

      - name: Nastavení proměnných prostředí na Azure
        run: |
          az webapp config appsettings set \
            --name "STIN-exchange-rate" \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings EXCHANGERATE_API_KEY=${{ secrets.EXCHANGERATE_API_KEY }}

      - name: Deploy na Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "STIN-exchange-rate"
          slot-name: "Production"
          package: .
