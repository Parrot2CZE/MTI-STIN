name: CI/CD — Build, Test, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # 1. Build + Test + Coverage                                          #
  # ------------------------------------------------------------------ #
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení Pythonu 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalace závislostí
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Spuštění testů a generování coverage reportu
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret
          EXCHANGERATE_API_KEY: test-key
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage reportu jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ------------------------------------------------------------------ #
  # 2. Deploy na Azure Web App (pouze při push na main)                 #
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy na Azure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení Pythonu 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalace závislostí
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy na Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
