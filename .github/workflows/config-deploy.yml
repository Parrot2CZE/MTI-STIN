name: Config Deploy — Azure restart

on:
  push:
    branches: [main]
    paths:
      - "config.yml"
  workflow_dispatch:

jobs:
  config-deploy:
    name: Deploy config.yml + restart
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Přihlášení do Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0368C3E91EE14B42966715AE98B7B04D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1FF21008CA9E4EF5BAA243B3F6F8417B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6E442F70FC17491BA11B210ED78FA17E }}

      - name: Upload config.yml přes Kudu API
        run: |
          TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
          curl -X PUT \
            "https://stin-exchange-rate.scm.azurewebsites.net/api/vfs/site/wwwroot/config.yml" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @config.yml

      - name: Restart Azure Web App
        run: |
          RG=$(az webapp show --name "stin-exchange-rate" --query resourceGroup -o tsv)
          az webapp restart --name "stin-exchange-rate" --resource-group "$RG"
